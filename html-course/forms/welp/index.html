<!DOCTYPE html>
<html>
  <head>
    <title>Welp!</title>
  </head>
  <body>
    <form>
    <h1>Welp!</h1>
    <h4><i>Lets review the best movie you have ever seen.</i></h4>
    
    <label for="movie-title">Movie Title:</label>
    <input type="text" id="movie-title" placeholder="Movie name here" required>
    <br><br>
    
    Would you watch again?<br>
    <input type="radio" id="yes" name="option"> 
    <label for="yes" required>YES👍</label><br> 
    <input type="radio" id="no" name="option">
    <label for="no" required>NO👎</label><br> 
    <input type="radio" id="maybe" name="option">
    <label for="maybe" required>MAYBE🤔</label><br><br>

    <label for="rating">Rating (1-5):</label>
    <select id="rating" name="rating">
    <option value="" disabled selected>Select your rating 🌟</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option></select>
    <br><br>
    <label for="comment">Your Comment:</label><br>
    <textarea id="comment" name="comment" rows="2" cols="25" maxlength="250" placeholder="Comment here..." required></textarea> 
    <br><br>
    <input type="submit" value="SUBMIT HERE!">
      </select>
    </form>
  </body>
</html>
